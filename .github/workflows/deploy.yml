name: CYRUS CI/CD Pipeline

# Runs on every push to main and the active Copilot branch.
# Stages:
#   1. Lint & type-check (Node + Python)
#   2. Build (client Vite bundle + typecheck)
#   3. Docker image build & smoke test
#   4. Deploy (Railway, Azure, or custom — gated on main branch)

on:
  push:
    branches:
      - main
      - "copilot/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: "cyrus"

jobs:
  # ── Job 1: Node.js lint + typecheck + build ─────────────────────────────────
  node-build:
    name: "Node.js: install → typecheck → build"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Build client (Vite)
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: node-dist
          path: dist/
          retention-days: 3

  # ── Job 2: Python syntax + import check ──────────────────────────────────────
  python-check:
    name: "Python: syntax + import check"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install core Python dependencies (no heavy ML packages)
        run: |
          pip install --upgrade pip
          pip install \
            fastapi uvicorn pydantic httpx openai redis tiktoken chromadb \
            loguru prometheus-client numpy \
            opentelemetry-sdk opentelemetry-instrumentation-fastapi

      - name: Python syntax check (compile all .py files)
        run: |
          find cyrus-ai -name "*.py" -print0 | xargs -0 python -m py_compile && \
          echo "✅ All Python files compile successfully"

      - name: Run fast import check
        working-directory: cyrus-ai
        env:
          CYRUS_NODE_ID: "ci-node"
          CYRUS_MODEL_MODE: "openai"
          CYRUS_DRONE_SIMULATED: "true"
          CYRUS_VISION_SIMULATED: "true"
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')

          # ── v2: Cognitive core ────────────────────────────────────────────────
          from planner import create_plan, describe_plan
          from autonomy import start_autonomy_loop, stop_autonomy_loop

          # ── v3: Multi-agent system ────────────────────────────────────────────
          from agents.base_agent import BaseAgent
          from agents.commander import Commander

          # ── v4: Evaluation + metrics layer ────────────────────────────────────
          from evaluation.evaluator import evaluate_response
          from metrics.tracker import log_metric, get_metrics, get_summary
          from optimization.improver import improve_system

          # ── v5: Platform layer (ingestion, fusion, actions) ───────────────────
          from ingestion.stream_ingestor import ingest_event, drain_events, ingestor_stats
          from fusion.fusion_engine import fuse_intelligence, get_last_fusion
          from actions.action_executor import execute_action

          # ── v6: Distributed layer ─────────────────────────────────────────────
          from distributed.message_bus import publish_event, is_redis_available
          from distributed.node_sync import start_node_keepalive, get_active_nodes
          from distributed.task_router import route_task
          from distributed.safe_exec import safe_execute

          # ── v7: Self-improving platform ───────────────────────────────────────
          from models.local_model import is_local_model_available, local_infer
          from models.versioning import list_model_versions, save_model_version_manifest
          from training.dataset_builder import get_dataset_stats, log_training_example
          from training.training_trigger import maybe_trigger_training

          # ── v8: Safety control layer ──────────────────────────────────────────
          from observability.logger import configure_logging, get_logger
          from observability.tracing import setup_tracing
          from alerts.alerter import send_alert, AlertSeverity, get_alert_history
          from backup.manager import get_backup_stats, list_backups
          from safety.override import enable_lockdown, disable_lockdown, is_locked
          from audit.logger import log_audit, load_recent_audit_logs
          from control.approval import request_approval, list_pending_approvals
          from mission_control.controller import start_mission, stop_mission, list_missions

          # ── v9: Production platform ───────────────────────────────────────────
          # (covered by observability/alerts/backup above)

          # ── v10: Embodied intelligence ────────────────────────────────────────
          from embodiment.drone_controller import DroneController
          from embodiment.core_loop import CyrusCoreLoop
          from perception.vision import VisionSystem
          from mission.engine import MissionEngine
          from human.interaction import get_interaction

          # ── v11: Swarm intelligence ───────────────────────────────────────────
          from swarm.swarm_controller import get_swarm_controller
          from swarm.formation import circle_formation, assign_formation_to_swarm
          from swarm.swarm_pursuit import get_coordinator
          from tracking.pursuit import get_pursuit_engine
          from nxi.map_engine import get_nxi_map

          # ── v12: Integration layer ────────────────────────────────────────────
          from config.settings import Settings
          from core.event_router import route_event
          from core.system_orchestrator import get_orchestrator

          print('✅ All CYRUS Python modules (v2–v12) import successfully')
          "

  # ── Job 3: Docker build ───────────────────────────────────────────────────────
  docker-build:
    name: "Docker: build production image"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [node-build, python-check]
    # Only build the Docker image on pushes, not PRs (reduces build minutes)
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image (Dockerfile.prod)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: false          # change to true when registry credentials are set
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }},${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: push to a container registry when secrets are configured
      # - name: Log in to registry
      #   if: github.ref == 'refs/heads/main'
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Push to GHCR
      #   if: github.ref == 'refs/heads/main'
      #   run: docker push ghcr.io/${{ github.repository_owner }}/cyrus:latest

  # ── Job 4: Deploy (main branch only) ────────────────────────────────────────
  deploy:
    name: "Deploy to Railway"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [node-build, python-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://cyrus.up.railway.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railwayapp/actions/deploy@main
        with:
          railway-token: ${{ secrets.RAILWAY_TOKEN }}
