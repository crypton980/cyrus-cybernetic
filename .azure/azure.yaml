name: cyrus-ai-system
metadata:
  template: cyrus-ai-template@1.0.0
services:
  web:
    project: .
    language: ts
    host: appservice
    hooks:
      predeploy:
        windows: npm install && npm run build
        posix: npm install && npm run build
infrastructure:
  template: infra/main.bicep
  parameters: infra/main.parameters.json