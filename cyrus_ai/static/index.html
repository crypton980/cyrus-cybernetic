<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYRUS Local Control</title>
    <style>
        :root {
            --bg-1: #efe2d0;
            --bg-2: #f8f3ea;
            --panel: #fffdf8;
            --ink: #1f2a2f;
            --muted: #5d6a70;
            --accent: #0f766e;
            --accent-2: #ef4444;
            --line: #dccfbf;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(1000px 500px at 5% 0%, rgba(15, 118, 110, 0.18), transparent 60%),
                radial-gradient(1000px 500px at 95% 100%, rgba(239, 68, 68, 0.12), transparent 60%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .shell {
            width: min(920px, 100%);
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(28, 25, 23, 0.18);
            overflow: hidden;
        }

        .masthead {
            padding: 22px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(90deg, #fbf7f1, #f6efe5);
        }

        .title {
            margin: 0;
            font-size: 28px;
            letter-spacing: 0.3px;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .status-row {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 12px 22px;
            border-bottom: 1px solid var(--line);
            background: #faf6ee;
        }

        .status-cell {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 10px;
            background: #fff;
        }

        .status-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-value {
            margin-top: 4px;
            font-weight: 700;
            font-size: 15px;
        }

        .ok {
            color: var(--accent);
        }

        .bad {
            color: var(--accent-2);
        }

        .chat-wrap {
            padding: 18px 22px 22px;
        }

        .chat {
            height: 360px;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            background: #fff;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 82%;
            padding: 10px 12px;
            border-radius: 10px;
            line-height: 1.4;
            font-size: 14px;
            animation: rise 180ms ease-out;
        }

        .user {
            align-self: end;
            background: #dcfce7;
            border: 1px solid #a7f3d0;
        }

        .cyrus {
            align-self: start;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
        }

        .meta {
            align-self: center;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #9a3412;
            font-size: 12px;
        }

        .composer {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
        }

        input:focus {
            outline: 2px solid rgba(15, 118, 110, 0.25);
            border-color: var(--accent);
        }

        button {
            border: 1px solid #0f766e;
            background: #0f766e;
            color: #fff;
            border-radius: 10px;
            padding: 0 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .quick {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .quick button {
            background: #fff;
            color: #0f766e;
            border-color: #99f6e4;
            padding: 7px 10px;
            font-size: 12px;
        }

        @keyframes rise {
            from {
                transform: translateY(6px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 760px) {
            .status-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .title {
                font-size: 23px;
            }

            .chat {
                height: 300px;
            }
        }
    </style>
</head>

<body>
    <main class="shell">
        <header class="masthead">
            <h1 class="title">CYRUS Unified Local Console</h1>
            <p class="subtitle">Single endpoint: cyrus.local:3311 for UI + API + mission ops</p>
        </header>

        <section class="status-row">
            <div class="status-cell">
                <div class="status-label">API</div>
                <div class="status-value" id="apiState">Checking...</div>
            </div>
            <div class="status-cell">
                <div class="status-label">Mode</div>
                <div class="status-value" id="modeState">-</div>
            </div>
            <div class="status-cell">
                <div class="status-label">Confidence</div>
                <div class="status-value" id="confidenceState">-</div>
            </div>
            <div class="status-cell">
                <div class="status-label">Host</div>
                <div class="status-value" id="hostState">-</div>
            </div>
        </section>

        <section class="chat-wrap">
            <div class="chat" id="chat">
                <div class="msg meta">Ready. Try ops commands like: Launch drone for mission reconnaissance.</div>
            </div>

            <div class="composer">
                <input id="prompt" placeholder="Send command to CYRUS" autocomplete="off" />
                <button id="sendBtn">Send</button>
            </div>

            <div class="quick">
                <button data-msg="Tell me a joke for kids">Kids mode check</button>
                <button data-msg="Explain quantum computing professionally">Professional mode check</button>
                <button data-msg="Is AI regulation effective? Debate me.">Debate mode check</button>
                <button data-msg="Launch drone for surveillance mission">Ops mission check</button>
            </div>
        </section>
    </main>

    <script>
        const chat = document.getElementById("chat");
        const prompt = document.getElementById("prompt");
        const sendBtn = document.getElementById("sendBtn");

        const apiState = document.getElementById("apiState");
        const modeState = document.getElementById("modeState");
        const confidenceState = document.getElementById("confidenceState");
        const hostState = document.getElementById("hostState");

        hostState.textContent = window.location.host;

        function add(text, cls) {
            const div = document.createElement("div");
            div.className = "msg " + cls;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function checkHealth() {
            try {
                const res = await fetch("/health");
                if (!res.ok) throw new Error("HTTP " + res.status);
                apiState.textContent = "Online";
                apiState.classList.add("ok");
                apiState.classList.remove("bad");
            } catch (err) {
                apiState.textContent = "Offline";
                apiState.classList.add("bad");
                apiState.classList.remove("ok");
                add("Health check failed: " + err.message, "meta");
            }
        }

        async function send() {
            const message = prompt.value.trim();
            if (!message) return;

            add(message, "user");
            prompt.value = "";
            const pending = add("CYRUS processing...", "meta");

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message, source: "web" })
                });

                pending.remove();
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();

                add(data.response || "(empty response)", "cyrus");
                modeState.textContent = data.mode || "unknown";
                confidenceState.textContent = typeof data.confidence === "number"
                    ? (data.confidence * 100).toFixed(0) + "%"
                    : "-";

                if (data.needs_clarification) {
                    add("Needs clarification to continue.", "meta");
                }
            } catch (err) {
                pending.remove();
                add("Request failed: " + err.message, "meta");
            }
        }

        sendBtn.addEventListener("click", send);
        prompt.addEventListener("keydown", (e) => {
            if (e.key === "Enter") send();
        });

        document.querySelectorAll(".quick button").forEach((btn) => {
            btn.addEventListener("click", () => {
                prompt.value = btn.dataset.msg || "";
                send();
            });
        });

        checkHealth();
    </script>
</body>

</html>
