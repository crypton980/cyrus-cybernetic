version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cyrus-db
    environment:
      POSTGRES_USER: cyrus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyrus_secure_password}
      POSTGRES_DB: cyrus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyrus"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  cyrus:
    build:
      context: ..
      dockerfile: standalone/Dockerfile
    container_name: cyrus-app
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://cyrus:${POSTGRES_PASSWORD:-cyrus_secure_password}@postgres:5432/cyrus
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_GEOCODING_API_KEY: ${GOOGLE_GEOCODING_API_KEY:-}
      GOOGLE_GEOLOCATION_API_KEY: ${GOOGLE_GEOLOCATION_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
