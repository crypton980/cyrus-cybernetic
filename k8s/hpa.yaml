# ── CYRUS HorizontalPodAutoscaler ────────────────────────────────────────────
#
# Scales the cyrus-core Deployment between 2 and 10 replicas based on
# CPU utilization.  Requires the Kubernetes Metrics Server to be installed.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cyrus-core-hpa
  namespace: cyrus
  labels:
    app.kubernetes.io/name: cyrus
    app.kubernetes.io/component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cyrus-core
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
