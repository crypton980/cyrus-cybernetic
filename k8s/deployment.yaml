apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyrus-core
  labels:
    app: cyrus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cyrus
  template:
    metadata:
      labels:
        app: cyrus
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: cyrus
          image: cyrus:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: node
              containerPort: 5000
            - name: py
              containerPort: 8001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: PYTHON_PORT
              value: "8001"
            - name: CYRUS_ENFORCE_REQUIRED_ENV
              value: "true"
            - name: CYRUS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CYRUS_MODEL_MODE
              value: "hybrid"
            - name: CYRUS_CONTROL_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: cyrus-secrets
                  key: control-token-secret
            - name: CYRUS_ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: cyrus-secrets
                  key: alert-webhook-url
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: cyrus-config
                  key: otel-exporter-otlp-endpoint
                  optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: node
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: py
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
---
apiVersion: v1
kind: Service
metadata:
  name: cyrus-core
  labels:
    app: cyrus
spec:
  selector:
    app: cyrus
  ports:
    - name: http
      port: 80
      targetPort: node
    - name: intelligence
      port: 8001
      targetPort: py
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cyrus-core-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cyrus-core
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cyrus-core-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cyrus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cyrus-config
data:
  otel-exporter-otlp-endpoint: "http://otel-collector:4317"
